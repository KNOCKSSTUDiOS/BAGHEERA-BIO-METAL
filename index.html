<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS Cinematic Intro</title>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000000; }
        
        #cinematic-video {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: 1;
        }

        #fx-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 2;
            pointer-events: none;
        }

        .ui-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0033;
            font-family: 'Impact', sans-serif;
            font-size: 5rem;
            letter-spacing: 0.5rem;
            display: none;
            text-shadow: 0 0 20px #ff0000;
            z-index: 10;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <video id="cinematic-video" autoplay muted playsinline></video>
    <canvas id="fx-canvas"></canvas>
    <!-- Explicit lower-case 'i' branding injection -->
    <div id="logo" class="ui-overlay">KNOCKSSTUDiOS</div>

    <script>
        const video = document.getElementById('cinematic-video');
        const canvas = document.getElementById('fx-canvas');
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 5;

        const metalMaterial = new THREE.MeshStandardMaterial({
            color: 0x111111, 
            metalness: 1.0,
            roughness: 0.02,
            envMapIntensity: 2.5
        });

        const redAlertLight = new THREE.PointLight(0xff0033, 5, 50);
        redAlertLight.position.set(0, 0, 3);
        scene.add(redAlertLight);

        const bugCount = 200;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(bugCount * 3);
        const bugStates = []; 

        for(let i = 0; i < bugCount; i++) {
            const idx = i * 3;
            positions[idx] = (Math.random() - 0.5) * 10;
            positions[idx+1] = (Math.random() - 0.5) * 6;
            positions[idx+2] = (Math.random() - 0.5) * 2;

            bugStates.push({
                x: positions[idx],
                y: positions[idx+1],
                z: positions[idx+2],
                vx: (Math.random() - 0.5) * 0.04,
                vy: (Math.random() - 0.5) * 0.04,
                behavior: 'scatter', 
                targetX: (Math.random() - 0.5) * 3, 
                targetY: (Math.random() - 0.5) * 1,
                timer: Math.random() * 500
            });
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const bugMaterial = new THREE.PointsMaterial({
            color: 0x33ffaa,
            size: 0.06,
            transparent: true,
            blending: THREE.AdditiveBlending,
            opacity: 0.9
        });

        const bugSwarm = new THREE.Points(geometry, bugMaterial);
        scene.add(bugSwarm);

        let pantherPounced = false;
        
        video.addEventListener('timeupdate', () => {
            if (video.currentTime > 3.5 && !pantherPounced) {
                pantherPounced = true;
                triggerScreenShatter();
            }
        });

        function triggerScreenShatter() {
            console.log("[ENGINE] Panther impact verified. Formatting KNOCKSSTUDiOS liquid metal text matrices...");
            bugStates.forEach(bug => {
                bug.vx *= 4; 
                bug.vy *= 4;
                if(Math.random() > 0.7) bug.behavior = 'land'; 
            });
            
            setTimeout(() => {
                document.getElementById('logo').style.display = 'block';
            }, 500);
        }

        const clock = new THREE.Clock();
        
        function mainLoop() {
            requestAnimationFrame(mainLoop);
            const delta = clock.getDelta();
            const posArray = bugSwarm.geometry.attributes.position.array;
            
            for(let i = 0; i < bugCount; i++) {
                const idx = i * 3;
                const bug = bugStates[i];

                if (bug.behavior === 'scatter') {
                    posArray[idx] += bug.vx;
                    posArray[idx+1] += bug.vy;
                    if (Math.abs(posArray[idx]) > 6) bug.vx *= -1;
                    if (Math.abs(posArray[idx+1]) > 4) bug.vy *= -1;
                } 
                else if (bug.behavior === 'land') {
                    posArray[idx] += (bug.targetX - posArray[idx]) * 0.05;
                    posArray[idx+1] += (bug.targetY - posArray[idx+1]) * 0.05;
                    
                    bug.timer--;
                    if(bug.timer <= 0) {
                        bug.behavior = 'flyAway'; 
                        bug.vx = (Math.random() + 0.1) * 0.08;
                        bug.vy = (Math.random() - 0.5) * 0.08;
                    }
                }
                else if (bug.behavior === 'flyAway') {
                    posArray[idx] += bug.vx;
                    posArray[idx+1] += bug.vy;
                }
            }
            
            bugSwarm.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        mainLoop();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
