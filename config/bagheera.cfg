# BAGHEERA-BIO-METAL engine configuration
# Key:value pairs, # starts a comment line.

# Number of bioluminescent bug particles for the WebGL layer.
bugCount: 200

# Liquid metal reflectivity factor (0.0 - 1.0).
reflectivity: 0.85

# Audio DSP sample rate in Hz.
sample_rate: 48000

# Sub-bass filter center frequency in Hz.
sub_frequency: 30.0

# Filter gain in dB.
gain_db: 12.0
