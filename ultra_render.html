<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAGHEERA OMNI-AURA 24K STAGE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }
        body { background: #000000; color: #ffffff; font-family: 'Impact', 'Arial Black', sans-serif; }
        #render-canvas { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        .control-hub {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .btn-ultra {
            background: linear-gradient(135deg, #ff0033 0%, #330005 100%);
            color: #ffffff; border: 2px solid #ff0033; padding: 18px 50px; font-size: 1.4rem;
            font-weight: 900; text-transform: uppercase; border-radius: 8px; letter-spacing: 2px;
            cursor: pointer; box-shadow: 0 0 30px rgba(255, 0, 51, 0.8); transition: 0.3s;
        }
        .btn-ultra:hover { background: #ff0033; box-shadow: 0 0 50px #ff0033; transform: scale(1.05); }
        .console-log { color: #00ffcc; font-family: monospace; font-size: 1.1rem; text-shadow: 0 0 12px #00ffcc; }
    </style>
</head>
<body>

    <canvas id="render-canvas"></canvas>
    
    <div class="control-hub">
        <div id="status-console" class="console-log">BAGHEERA 24K OMNI CORE V3 // ONLINE</div>
        <button class="btn-ultra" onclick="executeUltraExport()">GENERATE ULTRA 4D VIDEO</button>
    </div>

    <script>
        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d');
        
        // Massive resolution canvas bounds (Scaled down via CSS for crisp downsampled density)
        canvas.width = 2160; 
        canvas.height = 3840;

        // Multi-dimensional Particle Field Arrays (Omni-Aura Vectors)
        const particleCount = 300;
        const matrixParticles = [];
        
        for(let i = 0; i < particleCount; i++) {
            matrixParticles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                z: Math.random() * 10 + 1, // Deep 3D perception scale
                size: Math.random() * 6 + 2,
                vx: (Math.random() - 0.5) * 14,
                vy: (Math.random() - 0.5) * 14,
                glowPhase: Math.random() * Math.PI
            });
        }

        let currentFrame = 0;
        const maxFrames = 240; // Extended cinematic sequence length
        let targetRenderState = false;
        let recorderInstance;
        let dataChunks = [];

        function renderEngineFrame(f) {
            // 1. OMNI-AURA PITCH BLACK DEEP SPACE ENVIRONMENT
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Layered volcanic crimson dynamic lighting centers
            let lightCore = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, 1200);
            lightCore.addColorStop(0, 'rgba(255, 0, 51, 0.25)');
            lightCore.addColorStop(0.4, 'rgba(153, 0, 25, 0.08)');
            lightCore.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = lightCore;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. 4D NUMPY MATRIX FIELD SIMULATION (Hyper-glowing bioluminescent cells)
            matrixParticles.forEach(p => {
                p.x += p.vx * (p.z * 0.2); // Z-index speed modulation for depth
                p.y += p.vy * (p.z * 0.2);

                if (f === 50) { p.vx *= 6; p.vy *= 6; } // Shockwave velocity burst

                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (p.z * 0.15), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 255, 204, ${Math.max(0.2, Math.sin(f * 0.08 + p.glowPhase))})`;
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#00ffcc';
                ctx.fill();
            });
            ctx.shadowBlur = 0;

            // 3. PHOTOREALISTIC OBSIDIAN CHROMATIC TEXT PROCESSING
            ctx.textAlign = 'center';

            if (f > 50) {
                let dynamicInterpolation = Math.min(1, (f - 50) / 20);
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 3);
                ctx.scale(dynamicInterpolation, dynamicInterpolation);

                let heavyChrome = ctx.createLinearGradient(-500, 0, 500, 0);
                heavyChrome.addColorStop(0, '#050505');
                heavyChrome.addColorStop(0.25, '#888888');
                heavyChrome.addColorStop(0.5, '#ffffff');
                heavyChrome.addColorStop(0.75, '#555555');
                heavyChrome.addColorStop(1, '#050505');

                ctx.font = '900 160px Impact';
                ctx.fillStyle = heavyChrome;
                ctx.strokeStyle = '#ff0033';
                ctx.lineWidth = 6;
                ctx.fillText('KNOCKSSTUDiOS', 0, 0);
                ctx.strokeText('KNOCKSSTUDiOS', 0, 0);
                ctx.restore();
            }

            // High-velocity impact messaging reveal
            if (f > 85) {
                let revealAlpha = Math.min(1, (f - 85) / 25);
                
                ctx.font = 'bold 70px monospace';
                ctx.fillStyle = `rgba(255, 255, 255, ${revealAlpha * 0.9})`;
                ctx.fillText('⚡ BAGHEERA OMNI-DRIVE PROD ⚡', canvas.width / 2, canvas.height / 2 + 100);

                ctx.font = '900 180px Impact';
                ctx.fillStyle = `rgba(255, 0, 51, ${revealAlpha})`;
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#ff0033';
                ctx.fillText('HAPPY BIRTHDAY', canvas.width / 2, canvas.height / 2 + 320);
            }
        }

        // Active workspace engine loop preview
        function runtimePreview() {
            if(!targetRenderState) {
                currentFrame = (currentFrame + 1) % maxFrames;
                renderEngineFrame(currentFrame);
            }
            requestAnimationFrame(runtimePreview);
        }
        runtimePreview();

        // 4. POWER RECORDING UTILITY PIPELINE
        function executeUltraExport() {
            targetRenderState = true;
            dataChunks = [];
            currentFrame = 0;
            
            document.getElementById('status-console').innerText = "EXPORTING MULTI-DIMENSIONAL RENDER ARRAY...";

            const exportStream = canvas.captureStream(30);
            recorderInstance = new MediaRecorder(exportStream, {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: 15000000 // Massive 15Mbps stream capacity for crisp textures
            });

            recorderInstance.ondataavailable = (event) => { if(event.data.size > 0) dataChunks.push(event.data); };
            
            recorderInstance.onstop = () => {
                const multiLayerBlob = new Blob(dataChunks, { type: 'video/webm' });
                const downloadEndpoint = URL.createObjectURL(multiLayerBlob);
                
                const virtualLink = document.createElement('a');
                virtualLink.href = downloadEndpoint;
                virtualLink.download = `BAGHEERA_OMNI_AURA_24K_${Date.now()}.webm`;
                document.body.appendChild(virtualLink);
                virtualLink.click();
                
                document.getElementById('status-console').innerText = "SUCCESS! RENDER PIPELINE DISCHARGED CLEANLY.";
                targetRenderState = false;
            };

            recorderInstance.start();

            function pipelineIteration() {
                if(currentFrame < maxFrames) {
                    renderEngineFrame(currentFrame);
                    currentFrame++;
                    setTimeout(pipelineIteration, 33);
                } else {
                    recorderInstance.stop();
                }
            }
            pipelineIteration();
        }
    </script>
</body>
</html>
